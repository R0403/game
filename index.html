<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>キャンディ風マッチ3</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(#ffd6f0, #fff);
    text-align: center;
}

h1 { color: #ff4da6; }

#info {
    margin: 10px;
    font-size: 18px;
}

#board {
    display: grid;
    grid-template-columns: repeat(6, 70px);
    gap: 6px;
    justify-content: center;
}

.tile {
    width: 70px;
    height: 70px;
    border-radius: 15px;
    font-size: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s;
}

.tile:hover { transform: scale(1.1); }

.selected {
    outline: 3px solid #ff66cc;
}

.clear {
    opacity: 0;
    transform: scale(0.5);
}
</style>
</head>
<body>

<h1>🍭 キャンディ風マッチ3 🍬</h1>

<div id="info">
スコア: <span id="score">0</span> |
⏱ <span id="time">60</span> |
🔥 <span id="combo">0</span>
</div>

<div id="board"></div>

<script>
const size = 6;
const items = ["🍓","🍋","🍇","🍊","🍒","🍬"];

let grid = [];
let selected = null;

let score = 0;
let combo = 0;
let time = 60;
let gameActive = true;

const board = document.getElementById("board");

function randomItem() {
    return items[Math.floor(Math.random() * items.length)];
}

function createBoard() {
    board.innerHTML = "";
    grid = [];

    for (let i = 0; i < size * size; i++) {
        const tile = document.createElement("div");
        tile.className = "tile";
        tile.textContent = randomItem();
        tile.dataset.index = i;

        tile.onclick = () => clickTile(tile);

        board.appendChild(tile);
        grid.push(tile);
    }
}

function isAdjacent(a, b) {
    const i = +a.dataset.index;
    const j = +b.dataset.index;

    return (
        Math.abs(i - j) === 1 && Math.floor(i/size) === Math.floor(j/size) ||
        Math.abs(i - j) === size
    );
}

function clickTile(tile) {
    if (!gameActive) return;

    if (!selected) {
        selected = tile;
        tile.classList.add("selected");
    } else {
        if (isAdjacent(selected, tile)) {
            swap(selected, tile);

            if (!findMatches().length) {
                setTimeout(() => swap(selected, tile), 200);
                combo = 0;
            } else {
                process();
            }
        }

        selected.classList.remove("selected");
        selected = null;
    }
}

function swap(a, b) {
    let t = a.textContent;
    a.textContent = b.textContent;
    b.textContent = t;
}

// マッチ検出
function findMatches() {
    let matches = [];

    // 横
    for (let r = 0; r < size; r++) {
        let streak = 1;
        for (let c = 1; c < size; c++) {
            let i = r*size + c;
            let prev = r*size + c-1;

            if (grid[i].textContent === grid[prev].textContent) {
                streak++;
                if (streak >= 3) {
                    for (let k = 0; k < streak; k++) {
                        matches.push(i-k);
                    }
                }
            } else {
                streak = 1;
            }
        }
    }

    // 縦
    for (let c = 0; c < size; c++) {
        let streak = 1;
        for (let r = 1; r < size; r++) {
            let i = r*size + c;
            let prev = (r-1)*size + c;

            if (grid[i].textContent === grid[prev].textContent) {
                streak++;
                if (streak >= 3) {
                    for (let k = 0; k < streak; k++) {
                        matches.push(i - k*size);
                    }
                }
            } else {
                streak = 1;
            }
        }
    }

    return [...new Set(matches)];
}

// メイン処理（連鎖対応）
function process() {
    let matches = findMatches();

    if (matches.length === 0) {
        combo = 0;
        updateUI();
        return;
    }

    combo++;

    // 特殊ピース判定（簡易）
    if (matches.length >= 5) {
        let color = grid[matches[0]].textContent;
        grid.forEach((t,i)=>{
            if(t.textContent === color) matches.push(i);
        });
    }

    score += matches.length * 10 * combo;

    matches.forEach(i => {
        grid[i].classList.add("clear");
        setTimeout(()=> {
            grid[i].textContent = "";
            grid[i].classList.remove("clear");
        },200);
    });

    updateUI();

    setTimeout(drop, 250);
}

function drop() {
    for (let c = 0; c < size; c++) {
        for (let r = size-1; r >= 0; r--) {
            let i = r*size + c;
            if (!grid[i].textContent) {
                for (let k = r-1; k >= 0; k--) {
                    let above = k*size + c;
                    if (grid[above].textContent) {
                        grid[i].textContent = grid[above].textContent;
                        grid[above].textContent = "";
                        break;
                    }
                }
            }
        }
    }

    grid.forEach(t => {
        if (!t.textContent) t.textContent = randomItem();
    });

    setTimeout(process, 250);
}

function updateUI() {
    document.getElementById("score").textContent = score;
    document.getElementById("combo").textContent = combo;
}

// タイマー
function timer() {
    let t = setInterval(()=>{
        if (!gameActive) return;

        time--;
        document.getElementById("time").textContent = time;

        if (time <= 0) {
            gameActive = false;
            clearInterval(t);
            alert("終了！スコア: " + score);
        }
    },1000);
}

// 初期化
createBoard();
timer();
</script>

</body>
</html>
