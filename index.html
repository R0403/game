<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>完成版マッチ3</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(#ffd6f0, #fff);
    text-align: center;
}

#board {
    display: grid;
    grid-template-columns: repeat(6, 70px);
    gap: 6px;
    justify-content: center;
    margin-top: 10px;
}

.tile {
    width: 70px;
    height: 70px;
    border-radius: 15px;
    font-size: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
}

.selected { outline: 3px solid pink; }

.clear {
    transform: scale(0.5);
    opacity: 0;
}

/* コンボ演出 */
#comboText {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-size: 50px;
    color: #ff3399;
    opacity: 0;
    pointer-events: none;
    transition: 0.5s;
}

.showCombo {
    opacity: 1 !important;
    transform: translate(-50%, -50%) scale(1.2) !important;
}

/* ボタン */
button {
    padding: 10px 20px;
    font-size: 16px;
    margin: 10px;
}
</style>
</head>
<body>

<h1>🍭 マッチ3 🍬</h1>

<div>
スコア: <span id="score">0</span> |
🎯 手数: <span id="moves">30</span> |
🔥 <span id="combo">0</span>
</div>

<button id="startBtn">はじめる</button>
<button id="restartBtn" style="display:none;">もう一回</button>

<div id="board"></div>
<div id="comboText"></div>

<script>
const size = 6;
const items = ["🍓","🍋","🍇","🍊","🍒","🍬"];

let grid = [];
let selected = null;

let score = 0;
let combo = 0;
let moves = 30;
let gameActive = false;

const board = document.getElementById("board");
const comboText = document.getElementById("comboText");

function randomItem(){
    return items[Math.floor(Math.random()*items.length)];
}

function createBoard(){
    board.innerHTML="";
    grid=[];

    for(let i=0;i<size*size;i++){
        const tile=document.createElement("div");
        tile.className="tile";
        tile.textContent=randomItem();
        tile.dataset.index=i;
        tile.dataset.special="";

        tile.onclick=()=>clickTile(tile);

        board.appendChild(tile);
        grid.push(tile);
    }
}

function isAdjacent(a,b){
    let i=+a.dataset.index, j=+b.dataset.index;
    return (Math.abs(i-j)===1 && Math.floor(i/size)===Math.floor(j/size)) || Math.abs(i-j)===size;
}

function swap(a,b){
    [a.textContent,b.textContent]=[b.textContent,a.textContent];
    [a.dataset.special,b.dataset.special]=[b.dataset.special,a.dataset.special];
}

function clickTile(tile){
    if(!gameActive)return;

    if(!selected){
        selected=tile;
        tile.classList.add("selected");
    }else{
        if(isAdjacent(selected,tile)){
            swap(selected,tile);

            // ✅ 入れ替えた時点で手数減る
            moves--;

            if(!process()){
                setTimeout(()=>swap(selected,tile),200);
                combo=0;
            }

            checkEnd();
        }

        selected.classList.remove("selected");
        selected=null;
    }
}

function showComboEffect(){
    if(combo<=1)return;

    comboText.textContent=combo+" COMBO!";
    comboText.classList.add("showCombo");

    setTimeout(()=>{
        comboText.classList.remove("showCombo");
    },600);
}

function findMatches(){
    let matches=[];
    let specials=[];

    // 横
    for(let r=0;r<size;r++){
        let streak=[r*size];
        for(let c=1;c<size;c++){
            let i=r*size+c;
            if(grid[i].textContent===grid[i-1].textContent){
                streak.push(i);
            }else{
                if(streak.length>=3){
                    matches.push(...streak);
                    if(streak.length===4) specials.push({i:streak[0],type:"line"});
                    if(streak.length>=5) specials.push({i:streak[0],type:"bomb"});
                }
                streak=[i];
            }
        }
        if(streak.length>=3) matches.push(...streak);
    }

    // 縦
    for(let c=0;c<size;c++){
        let streak=[c];
        for(let r=1;r<size;r++){
            let i=r*size+c;
            if(grid[i].textContent===grid[i-size].textContent){
                streak.push(i);
            }else{
                if(streak.length>=3) matches.push(...streak);
                streak=[i];
            }
        }
        if(streak.length>=3) matches.push(...streak);
    }

    return {matches:[...new Set(matches)], specials};
}

function activateSpecial(i){
    let type=grid[i].dataset.special;

    if(type==="line"){
        let row=Math.floor(i/size);
        for(let c=0;c<size;c++){
            grid[row*size+c].textContent="";
        }
    }

    if(type==="bomb"){
        let color=grid[i].textContent;
        grid.forEach(t=>{
            if(t.textContent===color) t.textContent="";
        });
    }
}

function process(){
    let {matches,specials}=findMatches();

    if(matches.length===0){
        combo=0;
        updateUI();
        return false;
    }

    combo++;
    showComboEffect();

    score += matches.length * 10 * combo;

    specials.forEach(s=>{
        grid[s.i].dataset.special=s.type;
        grid[s.i].textContent=s.type==="bomb"?"🌈":"⭐";
    });

    matches.forEach(i=>{
        if(grid[i].dataset.special) activateSpecial(i);

        grid[i].classList.add("clear");
        setTimeout(()=>{
            grid[i].textContent="";
            grid[i].dataset.special="";
            grid[i].classList.remove("clear");
        },200);
    });

    updateUI();

    setTimeout(drop,250);
    return true;
}

function drop(){
    for(let c=0;c<size;c++){
        for(let r=size-1;r>=0;r--){
            let i=r*size+c;
            if(!grid[i].textContent){
                for(let k=r-1;k>=0;k--){
                    let above=k*size+c;
                    if(grid[above].textContent){
                        grid[i].textContent=grid[above].textContent;
                        grid[i].dataset.special=grid[above].dataset.special;
                        grid[above].textContent="";
                        grid[above].dataset.special="";
                        break;
                    }
                }
            }
        }
    }

    grid.forEach(t=>{
        if(!t.textContent){
            t.textContent=randomItem();
        }
    });

    setTimeout(process,250);
}

function updateUI(){
    document.getElementById("score").textContent=score;
    document.getElementById("combo").textContent=combo;
    document.getElementById("moves").textContent=moves;
}

function checkEnd(){
    if(moves<=0){
        gameActive=false;
        document.getElementById("restartBtn").style.display="inline-block";
    }
}

// ▶️ スタート
document.getElementById("startBtn").onclick=()=>{
    score=0;
    combo=0;
    moves=30;
    gameActive=true;

    document.getElementById("startBtn").style.display="none";
    document.getElementById("restartBtn").style.display="none";

    createBoard();
    updateUI();
};

// 🔁 リスタート
document.getElementById("restartBtn").onclick=()=>{
    document.getElementById("startBtn").style.display="inline-block";
    document.getElementById("restartBtn").style.display="none";
    board.innerHTML="";
};
</script>

</body>
</html>
