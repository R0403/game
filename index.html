<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>かわいいマッチ3パズル</title>
<style>
    body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(#ffe6f0, #fff);
        text-align: center;
    }

    h1 {
        color: #ff66a3;
    }

    #score {
        font-size: 20px;
        margin-bottom: 10px;
        color: #ff3399;
    }

    #board {
        display: grid;
        grid-template-columns: repeat(6, 60px);
        grid-template-rows: repeat(6, 60px);
        gap: 5px;
        justify-content: center;
    }

    .tile {
        width: 60px;
        height: 60px;
        border-radius: 12px;
        font-size: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.2s;
    }

    .tile:hover {
        transform: scale(1.1);
    }

    .selected {
        outline: 3px solid #ff66cc;
    }
</style>
</head>
<body>

<h1>🍬 かわいいマッチ3 🍭</h1>
<div id="score">スコア: 0</div>
<div id="board"></div>

<script>
const size = 6;
const board = document.getElementById("board");
const scoreDisplay = document.getElementById("score");

const items = ["🍓","🍋","🍇","🍊","🍒","🍬"];

let grid = [];
let selected = null;
let score = 0;

// 初期化
function createBoard() {
    grid = [];
    board.innerHTML = "";

    for (let i = 0; i < size * size; i++) {
        const tile = document.createElement("div");
        tile.classList.add("tile");

        const item = items[Math.floor(Math.random() * items.length)];
        tile.textContent = item;

        tile.dataset.index = i;

        tile.addEventListener("click", () => handleClick(tile));

        board.appendChild(tile);
        grid.push(tile);
    }
}

// タイルクリック
function handleClick(tile) {
    if (!selected) {
        selected = tile;
        tile.classList.add("selected");
    } else {
        swapTiles(selected, tile);
        selected.classList.remove("selected");
        selected = null;

        setTimeout(checkMatches, 100);
    }
}

// 入れ替え
function swapTiles(a, b) {
    let temp = a.textContent;
    a.textContent = b.textContent;
    b.textContent = temp;
}

// マッチチェック
function checkMatches() {
    let matched = [];

    // 横
    for (let row = 0; row < size; row++) {
        for (let col = 0; col < size - 2; col++) {
            let i = row * size + col;
            let t1 = grid[i].textContent;
            let t2 = grid[i+1].textContent;
            let t3 = grid[i+2].textContent;

            if (t1 === t2 && t2 === t3) {
                matched.push(i, i+1, i+2);
            }
        }
    }

    // 縦
    for (let col = 0; col < size; col++) {
        for (let row = 0; row < size - 2; row++) {
            let i = row * size + col;
            let t1 = grid[i].textContent;
            let t2 = grid[i+size].textContent;
            let t3 = grid[i+size*2].textContent;

            if (t1 === t2 && t2 === t3) {
                matched.push(i, i+size, i+size*2);
            }
        }
    }

    if (matched.length > 0) {
        matched.forEach(i => {
            grid[i].textContent = "";
        });

        score += matched.length;
        scoreDisplay.textContent = "スコア: " + score;

        setTimeout(dropTiles, 200);
    }
}

// 落下処理
function dropTiles() {
    for (let col = 0; col < size; col++) {
        for (let row = size - 1; row >= 0; row--) {
            let i = row * size + col;

            if (grid[i].textContent === "") {
                for (let k = row - 1; k >= 0; k--) {
                    let above = k * size + col;
                    if (grid[above].textContent !== "") {
                        grid[i].textContent = grid[above].textContent;
                        grid[above].textContent = "";
                        break;
                    }
                }
            }
        }
    }

    // 上から補充
    grid.forEach(tile => {
        if (tile.textContent === "") {
            tile.textContent = items[Math.floor(Math.random() * items.length)];
        }
    });

    setTimeout(checkMatches, 200);
}

// 初期化実行
createBoard();
</script>

</body>
</html>
