<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パズルゲーム</title>
<style>
body {
  font-family: sans-serif;
  background: #faf8ef;
  text-align: center;
  margin: 0;
}

h1 {
  margin-top: 10px;
}

#game {
  width: 300px;
  height: 300px;
  margin: 20px auto;
  background: #bbada0;
  border-radius: 10px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
  padding: 5px;
}

.tile {
  background: #cdc1b4;
  border-radius: 5px;
  font-size: 24px;
  font-weight: bold;
  display: flex;
  justify-content: center;
  align-items: center;
}

.tile[data-value="2"] { background: #eee4da; }
.tile[data-value="4"] { background: #ede0c8; }
.tile[data-value="8"] { background: #f2b179; color: white; }
.tile[data-value="16"] { background: #f59563; color: white; }
.tile[data-value="32"] { background: #f67c5f; color: white; }
.tile[data-value="64"] { background: #f65e3b; color: white; }

button {
  padding: 10px 20px;
  font-size: 16px;
}
</style>
</head>
<body>

<h1>パズルゲーム</h1>
<button onclick="init()">リスタート</button>
<div id="game"></div>

<script>
let board = [];

function init() {
  board = Array(4).fill().map(() => Array(4).fill(0));
  addTile();
  addTile();
  draw();
}

function addTile() {
  let empty = [];
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      if (board[r][c] === 0) empty.push({r, c});
    }
  }
  if (empty.length === 0) return;
  let {r, c} = empty[Math.floor(Math.random() * empty.length)];
  board[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function draw() {
  const game = document.getElementById("game");
  game.innerHTML = "";
  board.flat().forEach(v => {
    const div = document.createElement("div");
    div.className = "tile";
    if (v !== 0) {
      div.textContent = v;
      div.dataset.value = v;
    }
    game.appendChild(div);
  });
}

function slide(row) {
  let arr = row.filter(v => v);
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i+1]) {
      arr[i] *= 2;
      arr[i+1] = 0;
    }
  }
  arr = arr.filter(v => v);
  while (arr.length < 4) arr.push(0);
  return arr;
}

function rotate() {
  let newBoard = Array(4).fill().map(() => Array(4).fill(0));
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++)
      newBoard[c][3-r] = board[r][c];
  board = newBoard;
}

function move(dir) {
  for (let i = 0; i < dir; i++) rotate();
  for (let r = 0; r < 4; r++) {
    board[r] = slide(board[r]);
  }
  for (let i = 0; i < (4 - dir) % 4; i++) rotate();
  addTile();
  draw();
}

// キーボード操作
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") move(0);
  if (e.key === "ArrowUp") move(1);
  if (e.key === "ArrowRight") move(2);
  if (e.key === "ArrowDown") move(3);
});

// スマホ用スワイプ
let startX, startY;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - startX;
  let dy = e.changedTouches[0].clientY - startY;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 30) move(2);
    else if (dx < -30) move(0);
  } else {
    if (dy > 30) move(3);
    else if (dy < -30) move(1);
  }
});

init();
</script>

</body>
</html>
